    "contracts/kosh-mpc-signer",
    "contracts/kosh-account-registry",
    "contracts/kosh-vault",
]
resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2021"
license = "MIT"

[workspace.dependencies]
pbc_contract_common = { git = "https://gitlab.com/partisiablockchain/language/contract-sdk.git", tag = "v.16.126.0" }
