pbc_traits = { git = "https://gitlab.com/partisiablockchain/language/contract-sdk.git", tag = "v.16.126.0" }
pbc_lib = { git = "https://gitlab.com/partisiablockchain/language/contract-sdk.git", tag = "v.16.126.0" }
read_write_rpc_derive = { git = "https://gitlab.com/partisiablockchain/language/contract-sdk.git", tag = "v.16.126.0" }
read_write_state_derive = { git = "https://gitlab.com/partisiablockchain/language/contract-sdk.git", tag = "v.16.126.0" }
create_type_spec_derive = { git = "https://gitlab.com/partisiablockchain/language/contract-sdk.git", tag = "v.16.126.0" }
